<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepGuard Forensics</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      padding: 2rem;
      width: 100%;
      max-width: 640px;
      height: fit-content;
    }

    h2 { font-size: 1.4rem; margin-bottom: 0.25rem; color: #1a1a2e; }
    .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 1.5rem; }

    label { display: block; font-weight: 600; margin-bottom: 0.4rem; color: #333; }

    input[type="file"] {
      display: block;
      width: 100%;
      padding: 0.5rem;
      border: 2px dashed #bbb;
      border-radius: 6px;
      background: #fafafa;
      cursor: pointer;
      font-size: 0.9rem;
    }
    input[type="file"]:hover { border-color: #555; }

    button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.7rem;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover  { background: #2d2d5e; }
    button:disabled { background: #999; cursor: not-allowed; }

    #status {
      margin-top: 0.9rem;
      font-size: 0.9rem;
      color: #555;
      min-height: 1.2em;
    }

    #results { margin-top: 1.5rem; display: none; }

    .verdict-box {
      padding: 1rem 1.2rem;
      border-radius: 8px;
      margin-bottom: 1rem;
    }
    .verdict-box h3 { font-size: 1.2rem; margin-bottom: 0.3rem; }
    .verdict-box p  { font-size: 0.9rem; }

    /* FIX: Added INCONCLUSIVE colour — original HTML had no style for it */
    .AUTHENTIC     { background: #e8f5e9; border-left: 5px solid #2e7d32; color: #1b5e20; }
    .SUSPICIOUS    { background: #fdecea; border-left: 5px solid #c62828; color: #b71c1c; }
    .INCONCLUSIVE  { background: #fff8e1; border-left: 5px solid #f9a825; color: #e65100; }

    .hash-block {
      background: #f5f5f5;
      border-radius: 6px;
      padding: 0.7rem 1rem;
      margin-bottom: 1rem;
    }
    .hash-block strong { display: block; margin-bottom: 0.3rem; font-size: 0.85rem; color: #333; }
    .hash-block code   { font-size: 0.72rem; word-break: break-all; color: #444; }

    h4 { font-size: 0.95rem; margin-bottom: 0.5rem; color: #333; }

    ul { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }

    .flag-item {
      padding: 0.6rem 0.9rem;
      border-radius: 6px;
      font-size: 0.88rem;
      line-height: 1.5;
    }
    .flag-item strong { display: block; margin-bottom: 0.15rem; }

    .high   { background: #fdecea; color: #b71c1c; }
    .medium { background: #fff3e0; color: #e65100; }
    .low    { background: #e3f2fd; color: #0d47a1; }

    .no-flags { font-size: 0.9rem; color: #388e3c; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔍 DeepGuard Forensics</h2>
    <p class="subtitle">Metadata-based deepfake detection — no GPU required</p>

    <label for="videoFile">Select a video file</label>
    <input type="file" id="videoFile" accept=".mp4,.mov,.avi,.mkv,.webm,.flv" />

    <button id="analyseBtn" onclick="runAnalysis()">Run Forensic Analysis</button>

    <p id="status"></p>

    <div id="results">
      <div id="verdictBox" class="verdict-box">
        <h3 id="verdictText"></h3>
        <p  id="explanationText"></p>
      </div>

      <div class="hash-block">
        <strong>SHA-256 Fingerprint</strong>
        <code id="hashText"></code>
      </div>

      <h4>Forensic Flags</h4>
      <ul id="flagsList"></ul>
    </div>
  </div>

  <script>
    async function runAnalysis() {
      const fileInput = document.getElementById('videoFile');
      const status    = document.getElementById('status');
      const btn       = document.getElementById('analyseBtn');
      const results   = document.getElementById('results');

      // FIX: Validate that a file is actually selected before submitting
      if (!fileInput.files.length) {
        status.textContent = "Please select a video file first.";
        return;
      }

      // Disable button and show progress
      btn.disabled        = true;
      btn.textContent     = "Analysing…";
      status.textContent  = "Extracting metadata and running forensic checks…";
      results.style.display = "none";

      const formData = new FormData();
      formData.append("video", fileInput.files[0]);

      try {
        const res  = await fetch('/analyse', { method: 'POST', body: formData });
        const data = await res.json();

        if (data.error) throw new Error(data.error);

        // ── Verdict box ──────────────────────────────────────────────────────
        const verdictBox = document.getElementById('verdictBox');
        verdictBox.className = 'verdict-box ' + data.verdict.verdict;  // applies colour class

        document.getElementById('verdictText').textContent =
          'Verdict: ' + data.verdict.verdict;
        document.getElementById('explanationText').textContent =
          data.verdict.explanation;

        // ── Hash ─────────────────────────────────────────────────────────────
        document.getElementById('hashText').textContent = data.sha256;

        // ── Flags ─────────────────────────────────────────────────────────────
        const ul = document.getElementById('flagsList');
        ul.innerHTML = '';

        if (!data.flags.length) {
          ul.innerHTML = '<li class="no-flags">✔ No forensic anomalies detected.</li>';
        } else {
          data.flags.forEach(f => {
            const li = document.createElement('li');
            li.className = 'flag-item ' + f.severity.toLowerCase();
            li.innerHTML =
              `<strong>[${f.severity}] ${f.flag}</strong>${f.detail}`;
            ul.appendChild(li);
          });
        }

        status.textContent    = "Analysis complete.";
        results.style.display = "block";

      } catch (err) {
        status.textContent = "Error: " + err.message;
      } finally {
        btn.disabled    = false;
        btn.textContent = "Run Forensic Analysis";
      }
    }
  </script>
</body>
</html>
